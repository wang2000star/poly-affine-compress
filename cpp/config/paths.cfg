# =====================================================================
# Path Configuration — 所有实例的所有文件路径
# 程序从此文件读取路径，不允许硬编码。
#
# 格式：实例名  文件类型  完整路径
#
# 预处理文件类型（preprocessed/{inst}/，由 preprocess 统一生成）:
#   {inst}.eqn            — 重命名电路
#   {inst}.bij            — 变量名映射（输入→x_i, 输出→y_j, 内部→t_k）
#   {inst}_stats.txt      — 5 行统计（n_inputs, n_outputs, sum_T, union_T, max_deg）
#   {inst}_const.txt      — 常量输出分类
#   {inst}_affine.txt     — 仿射输出分类
#   {inst}_nonlinear.txt  — 非线性输出分类
#   {inst}.poly           — 原始 ANF 矩阵格式（仅 n≤16）
#
# 优化输出文件类型（results/{inst}/）:
#   raw_poly              — 原始 ANF（.{inst}_raw.poly）
#   raw_stats             — 原始 T 统计（{inst}_raw_stats.txt）
#   {combo}_affine        — 变换矩阵 .affine（Z = [Mx+b; Cx+d]）
#   {combo}_poly          — g(z) 多项式 .poly（矩阵格式 [e_0,...,e_{m-1},coeff]）
#   {combo}_stats         — T 统计 _stats.txt（5 行纯数字）
#   {combo}_verify        — 验证结果 _verify.txt
#   best_affine           — 最优变换 .affine
#   best_poly             — 最优多项式 .poly
#   best_stats            — 最优 T 统计 _stats.txt
#   best_verify           — 最优验证 _verify.txt
#   best_summary          — 各组合对比 _best_summary.txt
#
# combo = d1a_opt2 | d1a_opt1 | d1b_opt2 | d1b_opt1 | d2_opt2 | d3_opt2 | d3_opt1
# =====================================================================

