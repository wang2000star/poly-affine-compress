# time.cfg — 各实例×策略超时配置（秒）
# 被 run_complete.sh / run_aes.sh source 加载
# 未配置的组合使用脚本默认 $TIMEOUT
#
# 按键格式: <实例>_<策略>
#   实例: hd08 hd07 hd03 hd04 ctrl dec int2float cavlc hd10 hd01 hd02 hd09 hd11 hd12 aes_bool
#   策略: d1a_opt d1a_opt1 d1a_opt2 d1b_opt d1b_opt2 d2_opt d2_opt2 d3_opt d3_opt1 d3_opt2 d1c_opt d1c_opt2
declare -A STRAT_TIMEOUT

# ============================================================
# aes_bool — n=8, k=8, 7 strategies
# ============================================================
STRAT_TIMEOUT[aes_bool_d1a_opt1]=3600
STRAT_TIMEOUT[aes_bool_d1a_opt2]=3600
STRAT_TIMEOUT[aes_bool_d1b_opt2]=3600
STRAT_TIMEOUT[aes_bool_d2_opt2]=3600
STRAT_TIMEOUT[aes_bool_d3_opt1]=3600
STRAT_TIMEOUT[aes_bool_d3_opt2]=3600
STRAT_TIMEOUT[aes_bool_d1c_opt2]=3600

# ============================================================
# hd08 — n=8, k=1, 5 strategies
# ============================================================
STRAT_TIMEOUT[hd08_d1a_opt]=600
STRAT_TIMEOUT[hd08_d1b_opt]=600
STRAT_TIMEOUT[hd08_d2_opt]=600
STRAT_TIMEOUT[hd08_d3_opt]=600
STRAT_TIMEOUT[hd08_d1c_opt]=600

# ============================================================
# hd07 — n=8, k=8, 7 strategies
# ============================================================
STRAT_TIMEOUT[hd07_d1a_opt1]=600
STRAT_TIMEOUT[hd07_d1a_opt2]=600
STRAT_TIMEOUT[hd07_d1b_opt2]=600
STRAT_TIMEOUT[hd07_d2_opt2]=600
STRAT_TIMEOUT[hd07_d3_opt1]=600
STRAT_TIMEOUT[hd07_d3_opt2]=600
STRAT_TIMEOUT[hd07_d1c_opt2]=600

# ============================================================
# hd03 — n=16, k=8, 7 strategies (evaluation expensive)
# ============================================================
STRAT_TIMEOUT[hd03_d1a_opt1]=600
STRAT_TIMEOUT[hd03_d1a_opt2]=600
STRAT_TIMEOUT[hd03_d1b_opt2]=600
STRAT_TIMEOUT[hd03_d2_opt2]=600
STRAT_TIMEOUT[hd03_d3_opt1]=600
STRAT_TIMEOUT[hd03_d3_opt2]=600
STRAT_TIMEOUT[hd03_d1c_opt2]=600

# ============================================================
# hd04 — n=16, k=8, 7 strategies
# ============================================================
STRAT_TIMEOUT[hd04_d1a_opt1]=600
STRAT_TIMEOUT[hd04_d1a_opt2]=600
STRAT_TIMEOUT[hd04_d1b_opt2]=600
STRAT_TIMEOUT[hd04_d2_opt2]=600
STRAT_TIMEOUT[hd04_d3_opt1]=600
STRAT_TIMEOUT[hd04_d3_opt2]=600
STRAT_TIMEOUT[hd04_d1c_opt2]=600

# ============================================================
# ctrl — n=7, k=26, 7 strategies (many outputs)
# ============================================================
STRAT_TIMEOUT[ctrl_d1a_opt1]=600
STRAT_TIMEOUT[ctrl_d1a_opt2]=600
STRAT_TIMEOUT[ctrl_d1b_opt2]=600
STRAT_TIMEOUT[ctrl_d2_opt2]=600
STRAT_TIMEOUT[ctrl_d3_opt1]=600
STRAT_TIMEOUT[ctrl_d3_opt2]=600
STRAT_TIMEOUT[ctrl_d1c_opt2]=600

# ============================================================
# dec — n=8, k=256, 7 strategies (many outputs)
# ============================================================
STRAT_TIMEOUT[dec_d1a_opt1]=600
STRAT_TIMEOUT[dec_d1a_opt2]=600
STRAT_TIMEOUT[dec_d1b_opt2]=600
STRAT_TIMEOUT[dec_d2_opt2]=600
STRAT_TIMEOUT[dec_d3_opt1]=600
STRAT_TIMEOUT[dec_d3_opt2]=600
STRAT_TIMEOUT[dec_d1c_opt2]=600

# ============================================================
# int2float — n=11, k=7, 7 strategies
# ============================================================
STRAT_TIMEOUT[int2float_d1a_opt1]=600
STRAT_TIMEOUT[int2float_d1a_opt2]=600
STRAT_TIMEOUT[int2float_d1b_opt2]=600
STRAT_TIMEOUT[int2float_d2_opt2]=600
STRAT_TIMEOUT[int2float_d3_opt1]=600
STRAT_TIMEOUT[int2float_d3_opt2]=600
STRAT_TIMEOUT[int2float_d1c_opt2]=600

# ============================================================
# cavlc — n=10, k=11, 7 strategies
# ============================================================
STRAT_TIMEOUT[cavlc_d1a_opt1]=600
STRAT_TIMEOUT[cavlc_d1a_opt2]=600
STRAT_TIMEOUT[cavlc_d1b_opt2]=600
STRAT_TIMEOUT[cavlc_d2_opt2]=600
STRAT_TIMEOUT[cavlc_d3_opt1]=600
STRAT_TIMEOUT[cavlc_d3_opt2]=600
STRAT_TIMEOUT[cavlc_d1c_opt2]=600

# ============================================================
# n=32 实例 (hd10 hd01 hd02 hd09 hd11 hd12) — 3 strategies each
# ============================================================
for _inst in hd10 hd01 hd02 hd09 hd11 hd12; do
    STRAT_TIMEOUT[${_inst}_d1a_opt2]=600
    STRAT_TIMEOUT[${_inst}_d1b_opt2]=600
    STRAT_TIMEOUT[${_inst}_d3_opt2]=600
done
unset _inst
